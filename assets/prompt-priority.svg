<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 500" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="gL1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#d63031"/><stop offset="100%" stop-color="#ff7675"/></linearGradient>
    <linearGradient id="gL2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e17055"/><stop offset="100%" stop-color="#fab1a0"/></linearGradient>
    <linearGradient id="gL3" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#fdcb6e"/><stop offset="100%" stop-color="#ffeaa7"/></linearGradient>
    <linearGradient id="gL4" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#00b894"/><stop offset="100%" stop-color="#55efc4"/></linearGradient>
    <linearGradient id="gL5" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0984e3"/><stop offset="100%" stop-color="#74b9ff"/></linearGradient>
    <linearGradient id="gL6" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#b2bec3"/><stop offset="100%" stop-color="#dfe6e9"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#636e72"/></marker>
    <filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <text x="375" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2d3436">Prompt 优先级系统</text>
  <text x="375" y="50" text-anchor="middle" font-size="11" fill="#636e72">高优先级覆盖低优先级同名指令</text>

  <!-- Priority arrow on left -->
  <line x1="60" y1="80" x2="60" y2="440" stroke="#636e72" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="55" y="75" text-anchor="middle" font-size="10" fill="#d63031" font-weight="700">最高</text>
  <text x="55" y="455" text-anchor="middle" font-size="10" fill="#b2bec3" font-weight="700">最低</text>
  <text x="30" y="260" font-size="10" fill="#636e72" transform="rotate(-90,30,260)" text-anchor="middle">优先级</text>

  <!-- Level 1: Override -->
  <rect x="100" y="70" width="540" height="52" rx="10" fill="url(#gL1)" filter="url(#shadow)"/>
  <text x="130" y="92" fill="#fff" font-size="14" font-weight="700">1. Override</text>
  <text x="130" y="112" fill="#ffe0e0" font-size="10">最高优先级 · 内部安全指令 · 不可被覆盖</text>
  <rect x="520" y="80" width="100" height="28" rx="6" fill="rgba(255,255,255,0.25)"/>
  <text x="570" y="99" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">替换模式</text>

  <!-- Level 2: Coordinator -->
  <rect x="100" y="135" width="540" height="52" rx="10" fill="url(#gL2)" filter="url(#shadow)"/>
  <text x="130" y="157" fill="#fff" font-size="14" font-weight="700">2. Coordinator</text>
  <text x="130" y="177" fill="#ffe0e0" font-size="10">协调者注入 · Agent 通信指令</text>
  <rect x="520" y="145" width="100" height="28" rx="6" fill="rgba(255,255,255,0.25)"/>
  <text x="570" y="164" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">替换模式</text>

  <!-- Level 3: Agent -->
  <rect x="100" y="200" width="540" height="52" rx="10" fill="url(#gL3)" filter="url(#shadow)"/>
  <text x="130" y="222" fill="#2d3436" font-size="14" font-weight="700">3. Agent</text>
  <text x="130" y="242" fill="#636e72" font-size="10">Agent 角色定义 · 任务描述 · 工具约束</text>
  <rect x="520" y="210" width="100" height="28" rx="6" fill="rgba(0,0,0,0.1)"/>
  <text x="570" y="229" text-anchor="middle" fill="#2d3436" font-size="10" font-weight="600">替换模式</text>

  <!-- Level 4: Custom -->
  <rect x="100" y="265" width="540" height="52" rx="10" fill="url(#gL4)" filter="url(#shadow)"/>
  <text x="130" y="287" fill="#fff" font-size="14" font-weight="700">4. Custom</text>
  <text x="130" y="307" fill="#e0ffe0" font-size="10">用户自定义 Prompt · CLAUDE.md 指令</text>
  <rect x="520" y="275" width="100" height="28" rx="6" fill="rgba(255,255,255,0.25)"/>
  <text x="570" y="294" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">附加模式</text>

  <!-- Level 5: Default -->
  <rect x="100" y="330" width="540" height="52" rx="10" fill="url(#gL5)" filter="url(#shadow)"/>
  <text x="130" y="352" fill="#fff" font-size="14" font-weight="700">5. Default</text>
  <text x="130" y="372" fill="#e0f0ff" font-size="10">系统默认行为 · 编码规范 · 输出风格</text>
  <rect x="520" y="340" width="100" height="28" rx="6" fill="rgba(255,255,255,0.25)"/>
  <text x="570" y="359" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">附加模式</text>

  <!-- Level 6: Append -->
  <rect x="100" y="395" width="540" height="52" rx="10" fill="url(#gL6)" filter="url(#shadow)"/>
  <text x="130" y="417" fill="#2d3436" font-size="14" font-weight="700">6. Append</text>
  <text x="130" y="437" fill="#636e72" font-size="10">最低优先级 · 补充信息 · system-reminder</text>
  <rect x="520" y="405" width="100" height="28" rx="6" fill="rgba(0,0,0,0.1)"/>
  <text x="570" y="424" text-anchor="middle" fill="#2d3436" font-size="10" font-weight="600">附加模式</text>

  <!-- Legend -->
  <rect x="100" y="465" width="16" height="16" rx="3" fill="#d63031"/>
  <text x="122" y="478" fill="#2d3436" font-size="10">替换模式：高优先级同名指令覆盖低优先级</text>
  <rect x="400" y="465" width="16" height="16" rx="3" fill="#00b894"/>
  <text x="422" y="478" fill="#2d3436" font-size="10">附加模式：追加到 prompt 末尾</text>
</svg>
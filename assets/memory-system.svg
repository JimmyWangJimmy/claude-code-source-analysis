<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="system-ui,sans-serif">
  <defs>
    <filter id="s4"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter>
    <marker id="a5" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#6c5ce7"/></marker>
  </defs>
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2d3436">记忆系统三级架构</text>
  <!-- MEMORY.md -->
  <rect x="200" y="50" width="300" height="60" rx="10" fill="#6c5ce7" filter="url(#s4)"/>
  <text x="350" y="74" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">MEMORY.md</text>
  <text x="350" y="98" text-anchor="middle" fill="#e0e0ff" font-size="10">索引文件 · 200 行 / 25KB 硬上限 · 始终加载到上下文</text>
  <line x1="350" y1="110" x2="350" y2="140" stroke="#6c5ce7" stroke-width="2" marker-end="url(#a5)"/>
  <!-- Sub files -->
  <rect x="150" y="142" width="400" height="55" rx="10" fill="#a29bfe" filter="url(#s4)"/>
  <text x="350" y="166" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">记忆子文件</text>
  <text x="350" y="186" text-anchor="middle" fill="#e0e0ff" font-size="10">按主题组织 · 最多 200 个 · 最新优先 · 遵守 .gitignore</text>
  <line x1="350" y1="197" x2="350" y2="225" stroke="#6c5ce7" stroke-width="2" marker-end="url(#a5)"/>
  <!-- Agent Memory -->
  <rect x="100" y="227" width="500" height="55" rx="10" fill="#74b9ff" filter="url(#s4)"/>
  <text x="350" y="251" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Agent 记忆 (按类型隔离)</text>
  <text x="350" y="271" text-anchor="middle" fill="#e0f0ff" font-size="10">每种 Agent 类型独立目录 · explorer ≠ implementer</text>
  <!-- Three scopes -->
  <line x1="200" y1="282" x2="200" y2="310" stroke="#74b9ff" stroke-width="1.5" marker-end="url(#a5)"/>
  <line x1="350" y1="282" x2="350" y2="310" stroke="#74b9ff" stroke-width="1.5" marker-end="url(#a5)"/>
  <line x1="500" y1="282" x2="500" y2="310" stroke="#74b9ff" stroke-width="1.5" marker-end="url(#a5)"/>
  <rect x="100" y="312" width="180" height="55" rx="8" fill="#dfe6e9" filter="url(#s4)"/>
  <text x="190" y="334" text-anchor="middle" fill="#2d3436" font-size="11" font-weight="600">user 作用域</text>
  <text x="190" y="355" text-anchor="middle" fill="#636e72" font-size="9">~/.claude/agent-memory/</text>
  <text x="190" y="365" text-anchor="middle" fill="#636e72" font-size="9">跨所有项目</text>
  <rect x="260" y="312" width="180" height="55" rx="8" fill="#dfe6e9" filter="url(#s4)"/>
  <text x="350" y="334" text-anchor="middle" fill="#2d3436" font-size="11" font-weight="600">project 作用域</text>
  <text x="350" y="355" text-anchor="middle" fill="#636e72" font-size="9">.claude/agent-memory/</text>
  <text x="350" y="365" text-anchor="middle" fill="#636e72" font-size="9">可 git 追踪</text>
  <rect x="420" y="312" width="180" height="55" rx="8" fill="#dfe6e9" filter="url(#s4)"/>
  <text x="510" y="334" text-anchor="middle" fill="#2d3436" font-size="11" font-weight="600">local 作用域</text>
  <text x="510" y="355" text-anchor="middle" fill="#636e72" font-size="9">.claude/agent-memory-local/</text>
  <text x="510" y="365" text-anchor="middle" fill="#636e72" font-size="9">不入 git</text>
  <!-- Types row -->
  <g transform="translate(100,388)">
    <rect width="100" height="24" rx="12" fill="#6c5ce7"/>
    <text x="50" y="17" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">user 类型</text>
  </g>
  <g transform="translate(215,388)">
    <rect width="100" height="24" rx="12" fill="#00b894"/>
    <text x="50" y="17" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">feedback 类型</text>
  </g>
  <g transform="translate(330,388)">
    <rect width="100" height="24" rx="12" fill="#fdcb6e"/>
    <text x="50" y="17" text-anchor="middle" fill="#2d3436" font-size="9" font-weight="600">project 类型</text>
  </g>
  <g transform="translate(445,388)">
    <rect width="100" height="24" rx="12" fill="#e17055"/>
    <text x="50" y="17" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">reference 类型</text>
  </g>
</svg>

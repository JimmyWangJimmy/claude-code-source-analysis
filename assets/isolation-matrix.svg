<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 480" font-family="system-ui,sans-serif">
  <defs>
    <filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6c5ce7"/><stop offset="100%" stop-color="#a29bfe"/></linearGradient>
  </defs>

  <text x="375" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2d3436">Agent 隔离矩阵</text>
  <text x="375" y="50" text-anchor="middle" font-size="11" fill="#636e72">每种资源的隔离策略：共享 / 克隆 / 独立</text>

  <!-- Table header background -->
  <rect x="40" y="70" width="670" height="46" rx="10" fill="url(#gPurple)" filter="url(#shadow)"/>
  <text x="215" y="98" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">资源</text>
  <text x="430" y="98" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">共享</text>
  <text x="540" y="98" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">克隆</text>
  <text x="650" y="98" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">独立</text>

  <!-- Vertical lines for columns -->
  <line x1="380" y1="116" x2="380" y2="440" stroke="#dfe6e9" stroke-width="1"/>
  <line x1="490" y1="116" x2="490" y2="440" stroke="#dfe6e9" stroke-width="1"/>
  <line x1="600" y1="116" x2="600" y2="440" stroke="#dfe6e9" stroke-width="1"/>

  <!-- Row 1: AbortController -->
  <rect x="40" y="120" width="670" height="40" rx="0" fill="#f8f9fa"/>
  <text x="215" y="145" text-anchor="middle" fill="#2d3436" font-size="12" font-weight="600">AbortController</text>
  <circle cx="650" cy="140" r="10" fill="#e17055"/>
  <text x="650" y="144" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">独</text>

  <!-- Row 2: 文件状态 -->
  <rect x="40" y="160" width="670" height="40" rx="0" fill="#fff"/>
  <text x="215" y="185" text-anchor="middle" fill="#2d3436" font-size="12" font-weight="600">文件状态 (FileState)</text>
  <circle cx="430" cy="180" r="10" fill="#00b894"/>
  <text x="430" y="184" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">共</text>

  <!-- Row 3: 权限决策 -->
  <rect x="40" y="200" width="670" height="40" rx="0" fill="#f8f9fa"/>
  <text x="215" y="225" text-anchor="middle" fill="#2d3436" font-size="12" font-weight="600">权限决策</text>
  <circle cx="430" cy="220" r="10" fill="#00b894"/>
  <text x="430" y="224" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">共</text>

  <!-- Row 4: 工具列表 -->
  <rect x="40" y="240" width="670" height="40" rx="0" fill="#fff"/>
  <text x="215" y="265" text-anchor="middle" fill="#2d3436" font-size="12" font-weight="600">工具列表</text>
  <circle cx="540" cy="260" r="10" fill="#fdcb6e"/>
  <text x="540" y="264" text-anchor="middle" fill="#2d3436" font-size="9" font-weight="700">克</text>

  <!-- Row 5: 消息历史 -->
  <rect x="40" y="280" width="670" height="40" rx="0" fill="#f8f9fa"/>
  <text x="215" y="305" text-anchor="middle" fill="#2d3436" font-size="12" font-weight="600">消息历史</text>
  <circle cx="650" cy="300" r="10" fill="#e17055"/>
  <text x="650" y="304" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">独</text>

  <!-- Row 6: MCP -->
  <rect x="40" y="320" width="670" height="40" rx="0" fill="#fff"/>
  <text x="215" y="345" text-anchor="middle" fill="#2d3436" font-size="12" font-weight="600">MCP 连接</text>
  <circle cx="430" cy="340" r="10" fill="#00b894"/>
  <text x="430" y="344" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">共</text>

  <!-- Row 7: 记忆 -->
  <rect x="40" y="360" width="670" height="40" rx="0" fill="#f8f9fa"/>
  <text x="215" y="385" text-anchor="middle" fill="#2d3436" font-size="12" font-weight="600">记忆 (Memory)</text>
  <circle cx="540" cy="380" r="10" fill="#fdcb6e"/>
  <text x="540" y="384" text-anchor="middle" fill="#2d3436" font-size="9" font-weight="700">克</text>

  <!-- Row 8: System Prompt -->
  <rect x="40" y="400" width="670" height="40" rx="0" fill="#fff"/>
  <text x="215" y="425" text-anchor="middle" fill="#2d3436" font-size="12" font-weight="600">System Prompt</text>
  <circle cx="650" cy="420" r="10" fill="#e17055"/>
  <text x="650" y="424" text-anchor="middle" fill="#fff" font-size="9" font-weight="700">独</text>

  <!-- Table border -->
  <rect x="40" y="70" width="670" height="370" rx="10" fill="none" stroke="#dfe6e9" stroke-width="2"/>

  <!-- Legend -->
  <g transform="translate(130,455)">
    <circle cx="0" cy="0" r="8" fill="#00b894"/>
    <text x="14" y="4" fill="#2d3436" font-size="11" font-weight="600">共享：父子共用同一实例</text>
  </g>
  <g transform="translate(340,455)">
    <circle cx="0" cy="0" r="8" fill="#fdcb6e"/>
    <text x="14" y="4" fill="#2d3436" font-size="11" font-weight="600">克隆：基于父级拷贝后独立修改</text>
  </g>
  <g transform="translate(590,455)">
    <circle cx="0" cy="0" r="8" fill="#e17055"/>
    <text x="14" y="4" fill="#2d3436" font-size="11" font-weight="600">独立：全新创建</text>
  </g>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="system-ui,sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#6c5ce7"/></marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0984e3"/></marker>
    <linearGradient id="gPurple" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6c5ce7"/><stop offset="100%" stop-color="#a29bfe"/></linearGradient>
    <linearGradient id="gBlue" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0984e3"/><stop offset="100%" stop-color="#74b9ff"/></linearGradient>
    <linearGradient id="gGreen" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00b894"/><stop offset="100%" stop-color="#55efc4"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#2d3436">System Prompt 动态组装过程</text>

  <!-- STATIC BOUNDARY -->
  <rect x="60" y="50" width="680" height="150" rx="12" fill="none" stroke="#6c5ce7" stroke-width="2.5" stroke-dasharray="8,4" filter="url(#shadow)"/>
  <rect x="60" y="50" width="680" height="150" rx="12" fill="#6c5ce7" fill-opacity="0.06"/>
  <text x="100" y="75" font-size="13" font-weight="700" fill="#6c5ce7">STATIC BOUNDARY</text>

  <g transform="translate(90,90)">
    <rect width="120" height="36" rx="8" fill="url(#gPurple)" filter="url(#shadow)"/>
    <text x="60" y="23" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">身份声明</text>
  </g>
  <g transform="translate(225,90)">
    <rect width="120" height="36" rx="8" fill="url(#gPurple)" filter="url(#shadow)"/>
    <text x="60" y="23" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">工具指南</text>
  </g>
  <g transform="translate(360,90)">
    <rect width="120" height="36" rx="8" fill="url(#gPurple)" filter="url(#shadow)"/>
    <text x="60" y="23" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">安全规则</text>
  </g>
  <g transform="translate(495,90)">
    <rect width="120" height="36" rx="8" fill="url(#gPurple)" filter="url(#shadow)"/>
    <text x="60" y="23" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">编码规范</text>
  </g>
  <g transform="translate(295,140)">
    <rect width="120" height="36" rx="8" fill="url(#gPurple)" filter="url(#shadow)"/>
    <text x="60" y="23" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">输出风格</text>
  </g>

  <!-- Separator label -->
  <rect x="200" y="210" width="400" height="30" rx="6" fill="#fdcb6e" filter="url(#shadow)"/>
  <text x="400" y="230" text-anchor="middle" fill="#2d3436" font-size="11" font-weight="700">SYSTEM_PROMPT_DYNAMIC_BOUNDARY</text>

  <!-- DYNAMIC BOUNDARY -->
  <rect x="60" y="255" width="680" height="150" rx="12" fill="none" stroke="#0984e3" stroke-width="2.5" stroke-dasharray="8,4" filter="url(#shadow)"/>
  <rect x="60" y="255" width="680" height="150" rx="12" fill="#0984e3" fill-opacity="0.06"/>
  <text x="100" y="280" font-size="13" font-weight="700" fill="#0984e3">DYNAMIC BOUNDARY</text>

  <g transform="translate(90,295)">
    <rect width="120" height="36" rx="8" fill="url(#gBlue)" filter="url(#shadow)"/>
    <text x="60" y="23" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">当前日期</text>
  </g>
  <g transform="translate(225,295)">
    <rect width="120" height="36" rx="8" fill="url(#gBlue)" filter="url(#shadow)"/>
    <text x="60" y="23" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Git状态快照</text>
  </g>
  <g transform="translate(360,295)">
    <rect width="130" height="36" rx="8" fill="url(#gBlue)" filter="url(#shadow)"/>
    <text x="65" y="23" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">CLAUDE.md 记忆</text>
  </g>
  <g transform="translate(505,295)">
    <rect width="120" height="36" rx="8" fill="url(#gBlue)" filter="url(#shadow)"/>
    <text x="60" y="23" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">工具列表</text>
  </g>
  <g transform="translate(295,345)">
    <rect width="130" height="36" rx="8" fill="url(#gBlue)" filter="url(#shadow)"/>
    <text x="65" y="23" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Feature Flag 指令</text>
  </g>

  <!-- Merge arrows -->
  <line x1="300" y1="200" x2="300" y2="210" stroke="#6c5ce7" stroke-width="2"/>
  <line x1="500" y1="200" x2="500" y2="210" stroke="#6c5ce7" stroke-width="2"/>
  <line x1="300" y1="255" x2="300" y2="240" stroke="#0984e3" stroke-width="2"/>
  <line x1="500" y1="255" x2="500" y2="240" stroke="#0984e3" stroke-width="2"/>

  <!-- Down arrows to API -->
  <line x1="250" y1="405" x2="350" y2="460" stroke="#6c5ce7" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="405" x2="450" y2="460" stroke="#0984e3" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Merge label arrows from boundaries -->
  <path d="M 200 200 Q 200 430 350 460" fill="none" stroke="#6c5ce7" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 600 405 Q 600 430 450 460" fill="none" stroke="#0984e3" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- API Request box -->
  <rect x="310" y="460" width="180" height="48" rx="24" fill="url(#gGreen)" filter="url(#shadow)"/>
  <text x="400" y="490" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">API 请求</text>

  <!-- Cache note -->
  <rect x="500" y="520" width="260" height="40" rx="8" fill="#ffeaa7" filter="url(#shadow)"/>
  <text x="630" y="537" text-anchor="middle" fill="#2d3436" font-size="10" font-weight="600">静态部分 → prompt cache 命中</text>
  <text x="630" y="552" text-anchor="middle" fill="#636e72" font-size="9">动态部分每次请求重新生成</text>
  <line x1="500" y1="540" x2="460" y2="490" stroke="#fdcb6e" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" font-family="system-ui,sans-serif">
  <defs>
    <linearGradient id="gPart1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00b894"/><stop offset="100%" stop-color="#55efc4"/></linearGradient>
    <linearGradient id="gPart2" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6c5ce7"/><stop offset="100%" stop-color="#a29bfe"/></linearGradient>
    <linearGradient id="gPart3" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#e17055"/><stop offset="100%" stop-color="#fab1a0"/></linearGradient>
    <linearGradient id="gPart4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0984e3"/><stop offset="100%" stop-color="#74b9ff"/></linearGradient>
    <linearGradient id="gPart5" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00cec9"/><stop offset="100%" stop-color="#81ecec"/></linearGradient>
    <linearGradient id="gPart6" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#d63031"/><stop offset="100%" stop-color="#ff7675"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#636e72"/></marker>
    <filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/></filter>
  </defs>

  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="bold" fill="#2d3436">全书结构概览</text>
  <text x="400" y="54" text-anchor="middle" font-size="11" fill="#636e72">《Claude Code 深度解析》阅读路线图</text>

  <!-- Part 1 - Prominent start -->
  <rect x="30" y="80" width="200" height="130" rx="14" fill="url(#gPart1)" filter="url(#shadow)"/>
  <text x="130" y="108" text-anchor="middle" fill="#fff" font-size="16" font-weight="800">Part 1</text>
  <text x="130" y="130" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">先上手</text>
  <rect x="50" y="145" width="160" height="26" rx="6" fill="rgba(255,255,255,0.25)"/>
  <text x="130" y="163" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">Ch.1 五分钟上手</text>
  <rect x="50" y="178" width="160" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="130" y="196" text-anchor="middle" fill="#fff" font-size="10">快速入门 · 即学即用</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="145" x2="268" y2="145" stroke="#636e72" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Part 2 -->
  <rect x="270" y="70" width="230" height="160" rx="14" fill="url(#gPart2)" filter="url(#shadow)"/>
  <text x="385" y="98" text-anchor="middle" fill="#fff" font-size="16" font-weight="800">Part 2</text>
  <text x="385" y="118" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">核心架构</text>
  <rect x="290" y="130" width="190" height="24" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="385" y="147" text-anchor="middle" fill="#fff" font-size="10">Ch.2 运行循环与 System Prompt</text>
  <rect x="290" y="160" width="190" height="24" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="385" y="177" text-anchor="middle" fill="#fff" font-size="10">Ch.3 上下文管理</text>
  <rect x="290" y="190" width="190" height="24" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="385" y="207" text-anchor="middle" fill="#fff" font-size="10">Ch.4 权限与安全体系</text>

  <!-- Arrow 2→3 -->
  <line x1="500" y1="145" x2="538" y2="145" stroke="#636e72" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Part 3 -->
  <rect x="540" y="80" width="230" height="140" rx="14" fill="url(#gPart3)" filter="url(#shadow)"/>
  <text x="655" y="108" text-anchor="middle" fill="#fff" font-size="16" font-weight="800">Part 3</text>
  <text x="655" y="128" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">工具与安全</text>
  <rect x="560" y="140" width="190" height="24" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="655" y="157" text-anchor="middle" fill="#fff" font-size="10">Ch.5 工具系统深度剖析</text>
  <rect x="560" y="170" width="190" height="24" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="655" y="187" text-anchor="middle" fill="#fff" font-size="10">Ch.6 MCP 协议与扩展</text>

  <!-- Arrow 3→4 (down) -->
  <line x1="655" y1="220" x2="655" y2="270" stroke="#636e72" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Part 4 -->
  <rect x="540" y="270" width="230" height="140" rx="14" fill="url(#gPart4)" filter="url(#shadow)"/>
  <text x="655" y="298" text-anchor="middle" fill="#fff" font-size="16" font-weight="800">Part 4</text>
  <text x="655" y="318" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">智能体与记忆</text>
  <rect x="560" y="330" width="190" height="24" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="655" y="347" text-anchor="middle" fill="#fff" font-size="10">Ch.7 多 Agent 协作系统</text>
  <rect x="560" y="360" width="190" height="24" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="655" y="377" text-anchor="middle" fill="#fff" font-size="10">Ch.8 记忆与学习系统</text>

  <!-- Arrow 4→5 (left) -->
  <line x1="540" y1="340" x2="502" y2="340" stroke="#636e72" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Part 5 -->
  <rect x="270" y="270" width="230" height="140" rx="14" fill="url(#gPart5)" filter="url(#shadow)"/>
  <text x="385" y="298" text-anchor="middle" fill="#fff" font-size="16" font-weight="800">Part 5</text>
  <text x="385" y="318" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">集成与扩展</text>
  <rect x="290" y="330" width="190" height="24" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="385" y="347" text-anchor="middle" fill="#fff" font-size="10">Ch.9 IDE 集成桥接</text>
  <rect x="290" y="360" width="190" height="24" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="385" y="377" text-anchor="middle" fill="#fff" font-size="10">Ch.10 配置与 Hooks</text>

  <!-- Arrow 5→6 (left) -->
  <line x1="270" y1="340" x2="232" y2="340" stroke="#636e72" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Part 6 -->
  <rect x="30" y="260" width="200" height="170" rx="14" fill="url(#gPart6)" filter="url(#shadow)"/>
  <text x="130" y="290" text-anchor="middle" fill="#fff" font-size="16" font-weight="800">Part 6</text>
  <text x="130" y="310" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">深度专题</text>
  <rect x="50" y="322" width="160" height="24" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="130" y="339" text-anchor="middle" fill="#fff" font-size="10">Ch.11 流式渲染引擎</text>
  <rect x="50" y="352" width="160" height="24" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="130" y="369" text-anchor="middle" fill="#fff" font-size="10">Ch.12 性能与可观测性</text>
  <rect x="50" y="382" width="160" height="24" rx="5" fill="rgba(255,255,255,0.2)"/>
  <text x="130" y="399" text-anchor="middle" fill="#fff" font-size="10">Ch.13 OAuth 与部署</text>

  <!-- Reading order labels -->
  <text x="400" y="470" text-anchor="middle" font-size="12" fill="#636e72" font-weight="600">推荐阅读顺序</text>

  <!-- Reading path dots -->
  <g transform="translate(160,490)">
    <circle cx="0" cy="0" r="14" fill="url(#gPart1)"/>
    <text x="0" y="5" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">1</text>
  </g>
  <line x1="174" y1="490" x2="210" y2="490" stroke="#636e72" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(230,490)">
    <circle cx="0" cy="0" r="14" fill="url(#gPart2)"/>
    <text x="0" y="5" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">2</text>
  </g>
  <line x1="244" y1="490" x2="280" y2="490" stroke="#636e72" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(300,490)">
    <circle cx="0" cy="0" r="14" fill="url(#gPart3)"/>
    <text x="0" y="5" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">3</text>
  </g>
  <line x1="314" y1="490" x2="350" y2="490" stroke="#636e72" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(370,490)">
    <circle cx="0" cy="0" r="14" fill="url(#gPart4)"/>
    <text x="0" y="5" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">4</text>
  </g>
  <line x1="384" y1="490" x2="420" y2="490" stroke="#636e72" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(440,490)">
    <circle cx="0" cy="0" r="14" fill="url(#gPart5)"/>
    <text x="0" y="5" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">5</text>
  </g>
  <line x1="454" y1="490" x2="490" y2="490" stroke="#636e72" stroke-width="1.5" marker-end="url(#arrow)"/>
  <g transform="translate(510,490)">
    <circle cx="0" cy="0" r="14" fill="url(#gPart6)"/>
    <text x="0" y="5" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">6</text>
  </g>

  <!-- Tip -->
  <rect x="175" y="520" width="450" height="30" rx="8" fill="#dfe6e9"/>
  <text x="400" y="541" text-anchor="middle" fill="#636e72" font-size="10">Part 1 快速上手后，Part 2-6 可按兴趣跳读，每章相对独立</text>
</svg>
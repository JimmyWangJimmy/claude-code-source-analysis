<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="system-ui,sans-serif">
  <defs>
    <marker id="a2" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#6c5ce7"/></marker>
    <marker id="a3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#e17055"/></marker>
    <marker id="a4" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#00b894"/></marker>
    <filter id="s2"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter>
  </defs>
  <text x="360" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#2d3436">6 层权限决策链</text>
  <!-- Entry -->
  <rect x="250" y="44" width="220" height="36" rx="18" fill="#6c5ce7" filter="url(#s2)"/>
  <text x="360" y="68" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">工具调用请求</text>
  <line x1="360" y1="80" x2="360" y2="102" stroke="#6c5ce7" stroke-width="2" marker-end="url(#a2)"/>
  <!-- Layer 1 -->
  <rect x="220" y="104" width="280" height="42" rx="8" fill="#ff7675" filter="url(#s2)"/>
  <text x="360" y="122" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">① Deny 规则</text>
  <text x="360" y="138" text-anchor="middle" fill="#ffe0e0" font-size="10">最高优先级 · 命中即拒绝</text>
  <line x1="500" y1="125" x2="580" y2="125" stroke="#e17055" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="620" y="130" text-anchor="middle" fill="#e17055" font-size="11" font-weight="600">拒绝 ✕</text>
  <line x1="360" y1="146" x2="360" y2="164" stroke="#6c5ce7" stroke-width="2" marker-end="url(#a2)"/>
  <!-- Layer 2 -->
  <rect x="220" y="166" width="280" height="42" rx="8" fill="#00b894" filter="url(#s2)"/>
  <text x="360" y="184" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">② Allow 规则</text>
  <text x="360" y="200" text-anchor="middle" fill="#e0ffe0" font-size="10">命中即允许</text>
  <line x1="500" y1="187" x2="580" y2="187" stroke="#00b894" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="620" y="192" text-anchor="middle" fill="#00b894" font-size="11" font-weight="600">允许 ✓</text>
  <line x1="360" y1="208" x2="360" y2="226" stroke="#6c5ce7" stroke-width="2" marker-end="url(#a2)"/>
  <!-- Layer 3 -->
  <rect x="220" y="228" width="280" height="42" rx="8" fill="#fdcb6e" filter="url(#s2)"/>
  <text x="360" y="246" text-anchor="middle" fill="#2d3436" font-size="12" font-weight="600">③ Ask 规则</text>
  <text x="360" y="262" text-anchor="middle" fill="#636e72" font-size="10">命中则跳到用户确认</text>
  <line x1="360" y1="270" x2="360" y2="288" stroke="#6c5ce7" stroke-width="2" marker-end="url(#a2)"/>
  <!-- Layer 4 -->
  <rect x="220" y="290" width="280" height="42" rx="8" fill="#a29bfe" filter="url(#s2)"/>
  <text x="360" y="308" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">④ Hook 执行</text>
  <text x="360" y="324" text-anchor="middle" fill="#e0e0ff" font-size="10">用户定义的自动化规则</text>
  <line x1="360" y1="332" x2="360" y2="350" stroke="#6c5ce7" stroke-width="2" marker-end="url(#a2)"/>
  <!-- Layer 5 -->
  <rect x="220" y="352" width="280" height="42" rx="8" fill="#74b9ff" filter="url(#s2)"/>
  <text x="360" y="370" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">⑤ ML 分类器</text>
  <text x="360" y="386" text-anchor="middle" fill="#e0f0ff" font-size="10">2 阶段: 快速分类 → 思维链推理</text>
  <line x1="360" y1="394" x2="360" y2="412" stroke="#6c5ce7" stroke-width="2" marker-end="url(#a2)"/>
  <!-- Layer 6 -->
  <rect x="220" y="414" width="280" height="42" rx="8" fill="#636e72" filter="url(#s2)"/>
  <text x="360" y="432" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">⑥ 用户交互确认</text>
  <text x="360" y="448" text-anchor="middle" fill="#dfe6e9" font-size="10">或根据模式自动拒绝</text>
</svg>
